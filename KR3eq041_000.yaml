front:
  text: 序自譭譽失實人之品行學術非確證不能明余於醫理見一斑焉余質本陽虛幼服滋陰藥乃益弱戊辰會試至京去藥而習射氣漸充辛未旋里居數載稍得外感醫治之體愈肥氣反弱人目為壯非也陰愈盛陽愈衰耳一切停飲畏勞嗜臥口渴中消心悸脾泄及喉痹外痔等症不時迭出矣丙子再至京人言北京無醫遂不問藥丁丑冬下榻覺羅育君書齊獲晤淮陰吳君鞠通論甚豪上下古今瞭如指掌一日竊告育君胡君體肥嗜肉不久將得中風余心訝之又以嚴親己巳得熱痹左足拘攣心常戚戚因踵門叩之所論與他醫不同心益異之然亦未敢遽信也戊寅春君以所刻溫病條辨囑余重校又見君所醫皆奇效乃大驚服遂信醫學自有真也爰請就學君勉余先禁肉食從之乃峻治之效稍稍著是冬延余課其次子及壻治益峻次年余妻患寒痹以君之方抵家為時醫所阻妻竟亡痛醫道之晦甚因與君論醫焉先是臨海郟君芷谷得針法於天台山僧居京以瘍醫著名吳君欲余疾之速愈也謂沉痼之疴非針不達偕訪之論相得心亦古遂訂交郟君欲余習其傳而未暇余服君藥三載體日癯人皆驚而病則愈醫學至是日進癸未余成進士歸班待選聞慈親病遄歸痛不及治匍匐抵家嚴親扶杖行已十年矣壬午增劇臥不能起誡家人不余告至是始知之急投以消痰之劑數月愈夫以七旬老人十年劇病非余身試有得安敢遽屏肉食補劑反加消導哉後仍扶杖行者四載卒以疽發痛莫能救猶是膏粱生疔之故理雖曉然惜郟君已於甲申卒而傳遂絶余深悔未曾習其傳也是歲秋吳君抵淮省墓余鄰趙君岷江雲濤昆季痛其母時患痰飲且各有痼疾因余以禮迎之君喜越中山水且熟知余友嵊邑吳君雲章精地理樂與之友雲章病痰飲諸醫皆投以補劑故無效而轉劇得君治之乃愈其外沉疴怪症君應手而愈一如在京師時雖醫忌且詬識者自嘆服焉戊子余至京君已年愈七十聰明強固得於讀書之力為多君之為人心正口直性剛氣傲不如用藥之中正和平因是譭譽不一蓋明醫關造化非如時醫乘命運俗醫工便佞有由然也原非至親及窮乏者不為立方自以心性與君同也幸其子及壻傳而習之余因身受時醫補陰之誤囑君著醫醫病書辛卯歲書成當與君溫病條辨及未刻之醫案並傳不朽余師顧南雅先生贈以楹帖云具古今識藝斯進真世俗見功乃神蓋先生辛巳染燥疫得君而愈亦以身受之故言之親切有味也君之醫學余何能窺其涯涘特敘其知交之始末如此道光十有三年歲次癸巳仲秋之月蔣湖書屋主人序增訂醫醫病書序昔裴子有云學不貫今古識不通天人才不近仙心不近佛者斷不可作醫以誤世醫固神聖之業非後世讀書未成生計未就末路而居之具也是必慧有夙因念有專習窮致天人之理精思竭慮於古今之書而後可以言醫淮陰吳君鞠通研究醫書上自軒岐仲景下迄葉氏香岩先以醫術名於北與越人莫寶齊尚書交最密切莫壞痰飲喘不得臥病頗重吳君適回南省墓遂留紹或往莫家或居趙園時紹城任濟堂九先生名頗盛與之討論古今醫籍心心相印遂出溫病條辨一書互相辨析任君獨讚揚解兒難解産難二篇謂多發前人所未發余則謂自條自辨著書無此成例且其中缺誤處甚多由是拂吳君之意交遂疏厥後果見譏於會稽章氏虛谷載在醫門棒喝中益以見著書之難也吳君又著有醫案及醫醫病書兩種吳氏醫案從高君德僧處轉録醫醫病一書從何君廉臣處録存醫案議論高超方藥精切足為後學師範堪作診斷術之專書惜立方有流於過重者學之不善生命攸關尚宜逐案批明庶知去取不致貽誤來學醫醫病原文則體例混淆先後陵躐未盡妥善因不揣譾陋為之益其體例第其先後別為上下兩卷分作四編初編曰學醫總論計二十三條二編曰病理各論計十七條三編曰證治要論計二十四條四編曰用藥統論計十七條原書七十六條新增五條合計八十一條以成黃鐘之數並逐條加以按語或發其未盡或補其未備閲三月而始竣後人讀之可想見先生臨證時沉思渺慮診病制方之概庶不負先生之苦心也夫中華民國四年七月一日四明後學曹炳章赤電序於古越之和濟藥局增訂醫醫病書序醫所以醫病者也醫病者而干醫之病則病者之為病不可言矣炎黃以來醫者夥頤醫之病者亦夥頤病者之死於醫者之病亦正不知夥頤傷心人類悇憛孰甚此淮陰吳鞠通氏所以有醫醫病之作也原書七十餘條羼雜無紀讀者瞀目曹子炳章醫之好學者也為之鉤釽其義犁次其文目門為四曰學醫曰病理曰證治曰用藥吳說多溷曹乃剔之吳說尚微曹乃顯之吳說不免罅漏曹乃為之補苴吳說有時矜張曹乃為之折當吳氏學力全在溫病於是書亦確有見地然文不足以濟其質其論學醫也語多概略獨於病理證治上詆諆陰常不足之說而能辨明陰邪之王於陰分異於陰虛因力排苦寒諸方並及痘科外科眼科而特舉建中此與臟腑體用藥即隨之之說皆仁術慧心足以起天下人之死於不少曹子惟習之久服之深故三匝月而殺青將以付工問言於余余不知醫特竊悲悠悠人世病者不死於病者之病多死於醫者之病而醫者又不自知其所以病病者將愈益重其病若欲救病者之病則不得不先醫醫者之病欲醫醫者之病則吳氏之書不得不急行曹子其孟晉哉中華民國四年乙卯七月于越黃壽袞圃人甫志
