body:
  text: 吳鞠通傳吳君諱瑭字配珩號鞠通江蘇淮安府山陽縣人父守讓郡庠生以學教授里中弟子從者甚衆君十九歲而孤家貧棄舉子業走京師時四庫館開傭書以自給既於醫有得見宋元以來諸書皆疑其未盡及得內經靈樞難經乃知其源之所出傷寒論金匱知醫學莫先於此乃專力焉以觀諸家之書合而存不合者屏而學大進六氣為病今惟存傷寒論後人遂以傷寒之法遍治外感不效又謂辛溫不可用而各立方法然無能出傷寒論之範元人劉守真明吳又可始知其非我朝喻嘉言論之而方法亦不備吳人葉天士出始有治溫病之方而溫與寒判君師其意又甫求前人之書以明之為溫病條辨始於傷風繼言溫繼言暑濕燥而六氣之病治法始備道光之初民多病吐利死者君曰此燥之正氣也乃考明人沈目南燥病論復補秋燥勝氣論一卷其年順天鄉試監臨檄京尹市霹靂散百餘劑場中無死者霹靂散君所制方也性狷急不能容物遇俗醫處方之謬輒疵之所至輒避去至病家交口訾君君據理直言不徇人意人皆憚之同里參知汪文端公知君最深未幾卒既士彥以憂歸君遂無可語者長子卒君遂抑鬱得衄血疾道光十六年二月卒往與士彥言醫書仲景以下惟孫真人論八脈張隱菴本草崇原葉氏臨證指南可觀竇材之書但許其扶陽抑陰亦不可過信又嘆醫之謬妄欲為醫醫病書嘗出其稿相示君既卒求之則定為七十二則君居心忠厚篤於故舊與人能盡言處事悉當聞天下有水旱盜賊輒有憂色論某某賢某某不肖無阿徇豈獨精於醫哉然君之醫要可以信今而傳後難為不知者言也君初娶鮑氏生子廷蓮順天增生既卒有孫二人繼祖念祖繼室崔氏有子廷芷國子監生廷荃壻周宗信同里人庶乎守君之教惟病在人醫司其柄何圖爾醫乃先自病嗟嗟蒸民又焉託命君子憫焉為醫求醫焫艾砥針應手而施醫病其廖民用熙熙病繁而變其數盈千病醫視之非可言詮孰簡而賅庶幾十全凡醫之病或迷不知肌膚腠理在淺不治既入膏肓盧扁奚為或者自知坐而不理諱疾忌醫謂疢於美沉痼而軀卒以不起嗟嗟爾醫盍誦此書若藥瞑眩沉疴用祛苦口之利勿謂徐徐自漢迄今其書如海守先待後體用斯在嗟嗟爾醫慎旃無悔寶應朱士彥撰題詞病人之病賴醫人之醫醫人之病層出不窮將何以恤災救患捍衛生民哉仲尼謂工欲善其事必先利其器子輿氏謂不以規矩不能成方圓醫人者規矩也病人者所制之器也今將修規矩以成器作醫醫病書道光辛卯冬月吳鞠通自題一醫非上智不能論餘年三十歲時汪瑟庵先生山陽汪文端公謂余曰醫非神聖不能余始聆之而驚且疑也以為醫何如是之難哉醫道何如是之深哉茲經歷四十年矣時時體念時時追思愈知醫之難且深也蓋醫雖小道非真能格致誠正者不能上而天時五運六氣之錯綜三元更遞之變幻中而人事得失好惡之難齊下而萬物百穀草木金石鳥獸水火之異宜非真用格致之功者能知其性味之真耶及其讀書之時得少便足偏好偏惡謬於一家之言人者主之出者奴之愛讀簡便之書畏歷艱辛之境至於臨症之際自是而孟浪者害事自餒而畏葸者亦害事有所偏則不得其正非真能用誠正之功能端好惡以備四時之氣哉二氣運論五運六氣之理天地運行自然之道宋人疑為僞書者蓋未體驗也內經論氣運諸篇當與大易月令參看與大易相為表裡者也統言之天地陰陽一氣之流行也分言之則有兩儀四時五行六氣七政八風相為流行對待制化以化生萬物者也在天原未傷人在人之氣體有偏觸其相剋之氣而病如陽虛者易傷濕燥寒之陰邪陰虛者易傷風火暑之陽邪也精通氣運之理有先知之妙時時體驗其氣之已至未至太過不及何者為勝氣何者為中氣何者為復氣何者為化氣再用有者求之無者求之微者責之盛者責之之功臨症自有準的今人概不之講夢夢處方張冠李戴民命何堪三醫不明六氣論風寒暑濕燥火六淫之病唐宋以後皆未分析清楚如以傷寒法治溫病而又以溫病法治燥症且自唐以後皆未識燥症不講燥症只有沈目南先生論燥之勝氣引經為證與喻氏葉氏之論燥但指化氣而言者大不相同余已詳載溫病條辨中其餘概不之講甚至有云燥不為病者謬之至愚之甚也風為長養萬物之用在天為元且為百病之長豈燥屬金為殺厲之氣有反不為病之理蓋以陰陽應象大論中但言冬傷於寒春傷於風夏傷於暑秋傷於濕脫簡燥症一條故云爾也豈未見天元紀六元正紀諸篇詳言燥症之病乎此讀書而不能周密之故也四醫必備四時五行六氣論醫不備四時五行六氣之學萬不能醫四時五行六氣之病唐以後之醫多為門戶起見蓋欲天下之病人就其學術並非以我之學術救天下之病甚至某醫內傷某醫外感各由人定醫亦自誇豈知內因外因不內外因疑似甚多病者果能認症方書具在何待求醫醫學果可專門就醫者來宜先擇病且儒理兼賅非瘍醫可分業況外證脈絡亦內科可應通各執一見難號十全試由天道論之雖天亦不能不備四時五行六氣之全以為生長化收藏而成長養萬物之功豈人力大於天力但執一氣即能概六氣之全乎唐以後名醫之法可採而不可宗者也蓋皆各有所偏不能殫述如李東垣偏於溫和有似乎春竇真定名材宋紹興中開州巡檢又為太醫偏於火功有似乎夏劉河間偏於寒涼有似乎秋朱丹溪偏於補水有似乎冬雖不甚確然皆有所近學者能兼數子之所長而以內經難經仲景為主知用法而不僅於用方參考百家再渾之以太和之氣庶乎不背於道矣五三元氣候不同論三元氣候不同亦猶四時之候不同也上元之明醫其用藥必能合上元之氣中元之明醫其用藥必能調中元之偏下元之明醫其用藥必能矯下元之弊三元一百八十年人多無是長壽不能遍歷三元四時則每年一周醫可借四時以測三元矣如初春去寒未遠換大毛之衣為小毛之服仲春則著棉衣季春則換單夾夏則紗葛秋則由葛而單夾而棉而皮冬則復用大毛矣如仲景明醫也其作傷寒論原為建安紀年下元甲子傷寒頗多不忍宗族之死君親之病而作也後世不問何氣為病而一以傷寒之法治四時之病亦自覺不合遂人各注一傷寒書而悉以傷寒名書試問置風火暑濕燥五氣於何地傷寒二字顧名思義六氣本不全也餘生於中元戊寅癸丑年溫疫大行余著溫病條辨以正用傷寒法治溫病之失及至下元甲子以後寒病頗多辛巳年燥疫大行死者無算余作霹靂散以救之又補燥金勝氣論一卷附溫病條辨後近日每年有燥金症是餘一人之身歷中元則多火症至下元則多寒症燥症豈可執一家之書以醫病哉六藥物體用論體用互根之理醫者不可不知如肝與脾陰臟也而用則陽胃與膀胱陽腑也而用則陰如白芍烏梅生於陽而用則陰烏梅得初春之氣三陽開泰而開花白芍生芽於亥月歷六陽之月春盡而後開花其性皆能以收斂為用半夏生於夏半當歸秋分開花皆得陰氣而生者也半夏逐痰飲而最補胃陽當歸行血中之陽氣推而廣之無不皆然特舉臟腑藥味一二條以類其餘學者細心隨處體察其用無窮皆實學也學醫可也學儒亦可也泰極必否否極必泰損者多益益者可損莫不皆然道在是矣七五臟六腑體用治法論今人概言補虛不知五臟六腑各有補法即一臟一腑之中又有體用相反之殊臟屬陰其數五者陰反用奇也腑屬陽其數六者陽反用偶也亦如乾有四德坤有五行陽用偶而陰用奇互也故五臟六腑體陰者用必陽體陽者用必陰心為手少陰心之體主靜本陰也其用主動則陽也補陰者補其體也如龜板柏子仁丹參丹砂之類補陽者補其用也如桂枝人參茯神之類肝為足厥陰肝之體主人本陰也其用主出肝主疏泄又寅賓出入也則陽也補陰者補其體也如阿膠萸肉鱉甲牡蠣之類補陽者補其用也如當歸鬱金降香香附之類肺為手太陰主降本陰也其用主氣則陽也補陰者補其體也如麥冬沙參五味子百合之類補陽者補其用也如茯苓人參白朮白蔻之類脾為足太陰主安貞體本陰也其用主運行則陽也補陰者補其體也如桂圓大棗甘草白朮之類補陽者補其用也如廣皮益智仁白蔻仁神麯之類腎為足少陰主潤下主封藏體本陰也其用主布液主衛氣則陽也補陰者補其體也如鮑魚海參地黃元參之類補陽者補其用也如肉桂附子硫黃菟絲子之類六腑為陽其用皆陰膽為足少陽主開陽氣之先輸轉一身之陽氣體本陽也其用主決斷主義十一臟皆取決於膽則陰也補陽者補其體也如川椒吳萸當歸之類補陰者補其用也如青黛龍膽草胡連蘆薈之類胃為足陽明主諸陽之會經謂陽明如市體本陽也其用主納主下降則陰也補陽者補其體也如人參茯苓半夏薏仁之類補陰者補其用也如生地玉竹梨汁藕汁之類大腸為手陽明主傳化主變化體本陽也其用主納小腸之糟粕而降濁則陰也補陽者補其體也如薤白杏仁木香訶子之類補陰者補其用也如芒硝旋覆花知母豬膏之類小腸為手太陽主受盛化物體本陽也其用主納胃之水穀分其水而傳糟粕於大腸則陰也補陽者補其體也如附子灶中黃土丁香蓽茇之類補陰者補其用也如蘆薈黃連黃芩龍膽草之類三焦為手少陽體本陽也其用主引導陰陽開通障塞則陰也補陽者補其體也如川椒吳萸丁香肉桂之類補陰者補其用也如滑石木通燈芯寒水石之類膀胱為足太陽體本陽也其用則承氣化溲便注瀉則陰也補陽者補其體也如肉桂附子豬苓茯苓之類補陰者補其用也如黃柏川楝子晚蠶砂滑石之類凡補五臟之體者皆守藥補六腑之體者皆通藥蓋臟者藏也腑則過而不留者也八藥不能治病論藥之能治病者止有制方如吸毒石之吸毒雞嘴之治蜈蚣毒之類所謂禽之制在氣也時下所用之湯丸等方皆和方也藥物不能直行治病或曰藥既不能治病汝醫病能不用藥乎曰藥之走臟腑經絡撥動其氣血如官行文書行該管衙門使該管衙門官吏照牌理事臟腑以氣為官者則以血為吏以血為官者則以氣為吏藥入某臟某腑使其氣血調和令本臟之氣血自行去本臟之病亦有二三臟並治者如會稿然以一臟為主者如主稿然若臟腑氣血稍離雖有妙藥該管官吏不為奉行不為核轉查辦藥其如之何哉今人以為藥能治病尚隔一層九看病須察兼症論余前著溫病條辨中言外感交互有一千二百九十六條之多見者必以為怪惟深明大易之道者知之要知一千二百九十六條但指外感之自為交互而然尚未及內傷也若兼內傷則靡可紀極矣如傷寒論中酒客不可與桂枝湯凡大便先硬後必溏者不可與梔子豉湯瘡家禁汗亡血家禁汗腹中有動氣不可下之類皆設兼症之禁也今人治病一氣且辨之不清何況兼症按兼症有外感兼外感者如燥金氣運雖在夏月亦多腹脅疼痛嘔惡氣上阻胸脈弦緊短澀或泄瀉不止或竟大便十數日不通煩躁不寧反口渴思涼得涼則腹愈痛必以溫熱藥解之蓋金剋木之症必用火剋金也解尚未清忽又加暑症葉氏又有秋後伏暑內發新涼外加之明文按暑症已三氣蓋熱一氣濕一氣濕熱交而成暑又一氣再加新涼燥氣是四氣矣萬一病者本有肝鬱疝瘕動氣便血等症不知多少氣矣醫者可不條分縷析而細察之哉刑名家定案只舉其罪名之至重者而定之故曰除輕罪不議外醫者則不能一有遺漏必有後患如時文家做理搭題不敢空中駕御必須層層還到方可而兼症又當辨明何者為新病何者為舊病定法先治新病仲景云先治新病謂舊病當後治也即同為新病亦有次第如仲景傷寒論中表急急當救表裡急急當救里是也遺漏固不是而緩急有先後斷不可案也十答病家怕不怕論凡診病之家多有以怕不怕問醫家者答之不易非可以徑情答之也蓋膽大者答以不怕則小病必大大病必危雖不怕亦必答以怕也再三警戒以收其放恣之念而後可成功膽小者答以怕甚則病家毫無主見甚至一日延十數醫師巫雜進必不可救矣必醫者有識見有擔當答以有可救之理但不可亂而後可成功時下一概答以不怕蓋以都下風氣答以怕甚則另延醫矣只為自己打算不為病人打算惡在其為醫也十一用古方必求其立方之故論按古方用意微奧非若宋元以後之方無大深意而流弊無窮如八味丸專為攝少陰而設然專治婦人腎虛轉脬故名曰腎氣丸非為泛治水腫臌脹而設何今人不問症之偏寒偏熱偏虛偏實一概以八味丸作湯以治水腫臌脹即痰飲門中胸中有微飲苓桂朮甘湯主之腎氣丸亦主之按苓桂朮甘湯所治之飲外飲治脾也腎氣丸所治之飲內飲治腎也按腎虛水泛為痰但嗽不咳若外飲脾虛不能為胃行其津液一以強卑監之土為要土最惡濕八味丸中之地萸酸甘化陰愈化愈濕豈非背道而馳為賊立幟乎如麻黃湯治太陽傷寒葛根湯治陽明傷寒小柴胡湯治少陽傷寒今人不問何經一日便將羌防柴葛三陽表藥一齊俱用悖謬極矣甚至暑溫溫熱秋燥無不以三陽表藥治之者且有不問是何外感只以一柴葛解肌湯了事是何拉解如何能有效哉辨之不勝其辨學者由此類推可也再古方不可不信不可信之太過亦不能全信須對症細參斟酌盡善十二診病以現症為主不必拘執古方論診病者全在確識病情之寒熱虛實燥潤再能精察藥性有是病即有是藥無是病即無是藥有是病雖險絶之藥亦敢用無是病雖平淡之品亦不敢妄加再無不效之理有現症雖同而所以致病之由不同者斷不可執定古方如是用後學敢移易哉如陰吹一症金匱用豬膏發煎取其氣血俱潤也注謂腸胃俱槁故用純潤余凡治陰吹者三皆與原方相反無不神效其一面青唇白舌白滑不食不便脈則兩至腸雖槁而胃不槁因重用半夏桂枝廣皮枳實使胃中之積飲下行大腸而愈其一泄瀉腹痛知腸亦不槁矣蓋寒濕為病大用分利溫腑陽而愈其一少腹久痛而致陰吹脈弦緊竊思如男子小腸疝氣者然因大用溫通下焦而愈皆非豬膏發煎之症設使不能變通三症皆不愈矣十三不讀古書論今人不讀古書安於小就得少便足囿於見聞愛簡便畏繁重喜淺近懼深奧大病也神農本經靈樞素問難經傷寒論金匱要略易經詩經周禮禮記皆不可不讀者也近人所讀者陶氏六書壽世保元李士材三書汪訒庵本草備要醫方集解吳又可溫疫論甚至只讀藥性賦湯頭歌訣便欲行醫近代葉氏醫案精詳者多粗疏者少遠勝陶龔李三氏等書近日南方人多喜讀之然不讀古書不能得其要領但襲皮毛以謂葉派葉氏之書本不易讀蓋其書用古最多讀者不知其來路不能領會其用意而其書集於門人之手往往有前無後散金碎玉不能全備非其真有天分功夫者不能讀也且不讀內經金匱等古書不知其妙不能用也十四好博而不務精詳論滿眼書集各家議論萬有不齊胸中毫無要領務博而情不專學人大病以之吟風玩月則有餘以之立天下之大本了天下之大事則不可吾見六朝以後之才子誇多鬥靡下筆千言夷考其行反不如不識字之農夫女子能盡其子臣弟友之道天地間何樂生此聰明才辨人哉唐以後之醫家亦多染此習儒家之書汗牛充棟雖孔顏亦不能讀盡今日之書孔顏亦無那大工夫讀盡今日之書蓋孔顏斷不務虛名而拋荒實德也儒家之書雖多而要緊只有經書經書之中要緊而又要緊者莫過於易經四書人能身體力行易經四書之道他書雖不讀可也醫家之書亦不少而要緊之書亦只有內經難經玉函經內三種傷寒論金匱要略皆存卒病論亡臨證指南葉氏博而能精其不精者十之一二如不識燥證誤用桑白皮之類張隱菴本草崇原能識其所以然之故也拙著溫病條辨補古來一切外感之不足者也他如東垣十書丹溪心法河間三書可閲而不可讀以皆有倚於一偏之弊焉至陶氏六書則壞道之尤直不必閲其他不勝枚舉要皆不識六氣之全可參考而不必讀者也十五果達藝三者缺一不可論當日孔子稱仲子之果端木子之達冉子之藝蓋各舉其長而稱之要知果者不可不達不藝達者不可不果不藝藝者不可不果不達設使果者不達不藝豈非一鹵莽之夫何事不壞豈能從政設使達者不藝雖知其事而無以處其事亦未見其能了事也達者不果徒達而已矣藝者不果亦猶達之不果也藝者不達藝於何加余故謂非果達藝三者兼全不可以從政醫者亦然十六見理見事真切不恤人言論下愚之人不恤人言使下愚之人而恤人言其奸盜不可行矣上智不恤人言使上智而恤人言其天德王道亦不可行矣未曾學問思辨而驟欲篤行者孟浪人也既能學問思辨而恤人言不能篤行者乃見義不為無勇也儒與醫皆然十七治內傷須祝由論按祝由二字出自素問祝告也由病之所以出也近時以巫家為祝由科並列於十三科之中內經謂信巫不信醫不治巫豈可列之醫科中哉吾謂凡治內傷者必先祝由詳告以病之所由來使病人知之而不敢再犯又必細體變風變雅曲察勞人思婦之隱情婉言以開導之莊言以振驚之危言以悚懼之必使之心悅情服而後可以奏效如神餘一生得力於此不少有必不可治之病如單腹脹木乘土乾血癆噎食反胃癲狂之類不可枚舉葉氏案中謂無情之草木不能治有情之病亦此義也俗語云有四等難治之人老僧寡婦室女童男是也有四等難治之病酒色財氣是也難治之人難治之病須憑三寸不爛之舌以治之救人之苦心敢以告來者十八治內傷須辨明陰陽三焦論今人治內傷用六味八味者遍天下皆誤聽丹溪陽常有餘陰常不足之說用補中益氣湯者十之二三誤用東垣重方輕用之意而又不察傷陰傷陽惟自己好尚傳派是從從古稱誦讀勞陽謀慮傷陰如作文辦案持籌握算運籌帷幄者皆勞陰也如誦讀歌唱與一切力作汗出過多者皆勞陽也如外感濕燥寒三者陰邪皆傷人之陽氣者也然間有應補陰者如風火暑三者陽邪皆傷人之陰者也然間有應補陽者産後及老人大抵多陰不足然亦有陽不足者又必究上中下三焦所損何處補上焦以清華空靈為要補中焦以脾胃之體用各適其性使陰陽兩不相姦為要補下焦之陰以收藏納縮為要補下焦之陽以流動充滿為要余於溫病條辨拙作議補下焦峙立三法專翕膏補下焦之陰者也奇經丸補下焦之陽者也天根月窟膏陰陽並補使陰陽交紐者也補上焦如鑑之空補中焦如衡之平補下焦如水之注十九無論三因皆以胃氣為要論人之十二經皆取決於膽皆聽命於心皆受養於胃內經謂胃為十二經之海又謂十二經皆稟氣於胃秦越人著難經一則曰以胃氣為主再則曰以胃氣為主蓋有胃氣者生無胃氣者死余之所以惡人之一以六味補虛惡丹溪陽常有餘陰常不足之論立數地黃丸如麥味地黃丸知柏地黃丸之類丸者因黃柏滲濕而瀉相火知母瀉陽明獨勝之熱使陽明即有獨勝之熱可暫瀉而不可久服久服胃氣必傷必致不食試問人之後半生盡不得食盡服六味丸可活乎經謂凡甘皆補凡苦皆瀉名曰補之實則瀉之視仲景先師之建中純甘以補者豈非賊盜之與仁人乎且相火輔君火用事人之相火一刻所不能無者而可盡瀉之乎即有真陰不足相火過盛之症何不輔之以淡菜海參鮑魚龜板烏雞等多咸少甘血肉有情之品又能收納相火者而必以極苦瀉之乎麥味地黃酸甘化陰肺胃乾燥之症猶有用處而美其名曰八仙長壽丸使補陰而可長壽古謂人非陽氣不生活竟須改為人非陰液不生活矣古謂陽不盡不死陰不盡不仙須改為陰不盡不死陽不盡不仙矣豈非笑話胃為陽明經謂陽明如市諸陽之會也能生諸陽者也補虛重陽者謂護胃氣而然也即一切攻外感之邪與不內外之飲食傷必須一服注定胃氣多方以調護之方為正法不致有失二十時醫俗醫病論孔子謂如有周公之才之美使驕且吝其餘不足觀也已時醫又驕又吝妄抬身分重索謝資竟有非三百金一日請不至者此等風氣蘇州更甚如果能起死回生亦覺太過蓋病者不盡財翁細按其學甚屬平平用藥一以三分五分八分一錢為率俟其真氣復而病自退攘以為己功稍重之症即不能了為自己打算則利其如人命何己以是謀生人竟由是致死清夜自思於心安乎俗醫之病百出余不忍言即以一端而論京師謂做買賣紹興謂之開醫店可恥之極遑問其他且即以市道論殺人以求利有愧商賈遠甚二十一名醫病論名醫之病首在門戶之學其次則以道自任之心太過未免奴視庸俗語言過於剛直為衆所不容或臨症之際設有以不對症之方妄生議論者則怒髮衝冠幾有不顧而唾之勢設有性情柔遜者不肯力爭宛轉隱忍又誤大事做成庸醫殺人嗚呼安得許多聖人來學醫哉二十二論藥不論病論天下無不偏之藥無不偏之病醫者原以藥之偏矯病之偏如對症毒藥亦仙丹不對症穀食皆毒藥無論病家醫士只當講求病系何病法當用何法方當用何方藥當用何藥對準病情寒熱溫涼皆在所用無好無惡妙手空空無不見效若不論病之是非而議藥之可否寒者畏其泄熱者畏其燥醫者紙上談兵膠柱鼓瑟病者以耳為目惡直好諛吾不知其可也二十三醫者有好用之藥有畏用之藥論醫者之於藥也不可有絲毫成見不可有好用之藥有好用之藥必有不當用而用者病人死於是矣不可有畏用之藥有畏用之藥必有當用而不用者病人又死於是矣甚至自信自是直以身徇修齊治平以端好惡為主孰謂醫家不當如是耶然非格物誠意好惡莫端嗚呼可懼哉二十四世醫不知通補守補法論時人悉以黃耆地黃等呆笨之藥為補少涉流動之品便謂之消導不知補五臟補以守補六腑補以通補經絡筋經亦補以通也補九竅亦補以通周禮謂滑以養竅是也補肌肉則有守有通守補處所用者少五臟為地氣其形小也通補處所用者多六腑與外廓為天氣其形大也二十五補虛先去實論虛損有應補者先查有無實症礙手與否如有實症礙手必當先除其實不然虛未能補而實症滋長矣古謂病有三虛一實者先治其實後治其虛蓋謂虛多實少猶當先治實症也如澆灌嘉禾必先薅除糧莠撫恤災民必先屏除盜賊房破當修損症也必先除去碎磚破瓦積土陳灰而後可以安線此理甚明舉世不知何昧昧耶二十六俗傳虛不受補論俗傳虛不受補便束手無策以為可告無愧蓋曰非我之不會補彼不受也不知虛不受補之症有三一者濕熱盤踞中焦二者肝木橫穿土位三者前醫誤用呆膩閉塞胃氣而然濕熱者宣其濕而即受補肝木橫者宣肝絡使不剋土即受補誤傷胃氣者先和胃氣即受補矣和胃有陰陽之別寒熱之分胃陽受傷和以橘半之類胃陰受傷和以鮮果汁甘涼藥品之類隨症類推惟胃氣絶者不受補則不可救矣二十七陽大陰小論泰卦謂小往大來否卦曰大往小來可見陽大陰小不待辨而自明矣而人猶不之知再觀地球陰也地球之外皆陽也地球較日輪猶小試觀日輪之在天下也不及天萬分之一則天之大為何如哉天不如是之大何以能包羅萬象化生萬物哉人亦天地之分也內景五臟為地外則天也外形腹為陰余皆陽也陽不大斷不能生此身也亦如天不極大不能包地而化生萬物也是陽氣本該大也陰質本該小也何雲陽常有餘陰常不足見癆病必與補陰必使陽小陰大而後快於心哉經謂勞者溫之蓋溫者長養和煦之氣故能復其癆也豈未之讀耶二十八陰常有餘陽常不足論前人有陽常有餘陰常不足之論創為補陰之說不知陽本該大陰本該小前已論之矣竊思陰苦有餘陽苦不足也如一年三百六十日除去夜分日光不照之陰一百八十日晝分日光應照之陽實不足一百八十日也蓋有風雲雨雪之蔽非陽數較缺乎一也再人附地而生去天遠去地近濕系陰邪二也君子恆少小人恆多三也古來治世恆少亂世恆多四也在上位恆少在下位恆多五也故三教聖人未有不貴陽賤陰者亦未有不扶陽抑陰者更未有不尊君父而卑臣子者陽畏其亢藏者則吉坤之初六曰履霜堅冰至聖人示戒之早如此概可知矣二十九虛勞論虛勞一證今人概用補陰惑於陽常有餘陰常不足之論自丹溪作俑牢不可破為害無窮殺人無算可勝嘆哉蓋陽剛一錯立刻見禍陰柔雖錯可至月餘甚至二三月之久仍然拖延歲月用陰柔易於藏拙不知陽藥之錯即時見症立可補救陰柔錯之既久則不可為矣蓋陰柔小人禍暗而深人狎而玩所謂雖有善者亦無如是何矣按虛勞一症陽虛者多陰虛者少一則人身附地而生陰自有餘二則人為倮蟲屬土賴火而生至於一朝動作行為皆傷中陽與衛陽也惟熱病之後婦人産後傷陰者十居八九房勞則有傷陰有傷陽有傷八脈八脈受傷補之亦以督脈之陽為主蓋陽能統陰陰不能統陽也其他則傷陽居多今人恣用補陰愛用寒涼傷陽益甚矣古人云陽不盡不死又云人非陽氣不生活試觀卒中而死之人死後肌肉一毫不減陰雖充滿無補於生群毆重傷之人肌肉渾身受損苟非致命無害於生觸類旁通陰陽孰重即應當補陰之症仍所以為戀陽計也析薪為生火也添油為明燈也娶妻為生子也從來最善補虛者莫若仲景仲景謂大則為芤弦則為減芤則為虛減則為寒虛寒相搏其名曰革男子失精亡血女子半産漏下諸虛不足小建中湯主之夫失精亡血半産漏下非傷陰也哉仲景何以不用冬地丹萸而用建中乎蓋建中以調和營衛為扼要以補土為主藥止六味而甘藥居其四俾病者開胃健食欲其土旺生金金復生水以生木木生火而火又生土循環無已其意蓋不欲以藥補虛而使之脾胃健旺以飲食補虛此君子以人治人之道也豈淺學所知哉至東垣喜立門戶舍建中不用而易之以補中益氣雖補中益氣用處不少原從建中脫胎究不若建中之沖和恬淡補中益氣未免矜才使氣中虛而下焦實者猶不害事若下焦亦虛禍正不小前人畏其有盜腎氣之慮建中妙在雖然補氣營藥實多桂枝雖然衛藥營中之衛藥也不似補中益氣之升柴純然走衛矣建中得陽卦多陰陰卦多陽之妙補中益氣何足以語此故建中可以久服補中益氣斷不可多服也婦人虛勞門中之新絳旋覆花湯血藥居其一氣藥居其二仍以通陽為主薯蕷丸陰陽平補陽虛居多傷寒脈結代虛之極矣復脈湯中用參桂薑棗甘草大概可知矣三十吐血論吐血一症有內傷有外感有熱症有寒症有氣病有血病今人見血投涼見血補陰相習成風南北一轍經謂陽絡傷則血上溢其傷絡者豈盡陽邪哉如君相兩火司令與風溫溫熱三陽實火吐血固系陽邪自宜涼潤且用苦寒若怒郁脅痛咳血則屬陰邪非溫絡不可痰飲震動肺絡咳血脈洪大者用石膏茯苓皮之類脈弦細者則用乾薑炭廣皮炭矣若氣不攝血脈芤者急急峻補陽氣如獨參湯之類猶恐不及豈可用寒涼與補陰哉吐血之症有吐血有咳血有嘔血有肺血有胃血有肝血有腎血有衝脈上衝之血心血見則必死須分別治之何者當溫經當補陽當通絡當補絡當補陰當瀉火當清金各有調理豈一犀角地黃湯可以了事哉三十一便血論便血一症今人舍槐花地榆生地丹皮無二法焉金匱明分遠血近血先血後糞曰近血乃大腸濕熱治以當歸散先糞後血曰遠血乃小腸寒濕治以黃土湯黃土湯中用附子峻溫之即或先後難辨總有色脈可憑豈可一概寒涼哉更有糞之先後俱見血者當從遠血例治三十二溺血論溺血一症今人概用導赤散不知此症肝鬱最多當活肝絡其所以當活肝絡之故蓋由飲食入胃取汁變化而赤是謂血心主之脾統之肝藏之由肝下注衝脈肝鬱則血瘀滯血瘀滯則失其常行之路非吐血咳血則溺血矣不吐不溺其脅必痛甚皆以活肝絡為要主在診病時問其曾有怒郁否或肝絡所行之道有痛楚否其脈必弦甚或微數或竟不數導赤法即不合蓋肝藏血肝病則疏泄太過由衝脈而注前陰若女子崩症亦多有因肝鬱而得者女子更以肝為先天也豫素治溺血用新絳旋覆花湯合繆氏法蘇子降氣湯虎杖散法應手而效不一矣敢以質之同志三十三小便論小便不通或淋今人概用五苓八正不知有病在溺管者有病在精管者如病在精管豈通膀胱之腑所能效哉當通陰絡怒郁溺不通者亦當通陰絡按小便之不通有肺病蓋肺主天氣又肺為人身之橐鑰此氣一鼓則周身之氣運動肺家有病則周身之氣呆鈍蓋物之無肺者不溺當開肺痹亦有小腸結者當極苦以通火腑更有極怒而大小便俱閉者亦當極苦以通小腸此膽病也膽無出路借小腸以為出路小腸火腑非苦不通三十四大便論大便不通一症今人概以大黃下之按肺與大腸相表裡開肺痹即所以開大腸之痹有因感受燥金之氣而寒閉者非巴霜溫下之不可疝瘕大便閉亦同上溫下法蓋疝瘕即燥金之氣所結而成者也有燥氣化火或臟氣本乾燥者則當用甘潤法有幽門血分不通者則當用東垣通幽法有痰飲津液不行大腸而便閉者則當用杏仁枳實陳皮半夏以通幽門氣分使津液下行怒鬱則用蘆薈胡連龍膽草極苦通小腸惟陽明腑實方用承氣三十五頭痛論頭痛一症今人概用羌活藁本蔓荊子之通太陽者治之此外絶無他法不知有太陽頭痛有陽明頭痛有少陽頭痛此係外感怒郁少陽偏頭痛此係內傷厥陰頭痛陽虛頭痛陰虛頭痛膽移熱於腦而成鼻淵頭亦暈痛怒郁上衝滿頭痛風襲太陽之絡久頭痛各宜分別治之稍不清楚則不見效若真頭痛一痛即死無可治也與真心痛同例頭暈一症陰虛者多今人概認為風即肝風內動亦系陰虛之故乃上盛者下必虛也非外風也有産婦頭暈治以補陰者有痰飲頭暈治以半夏者有水飲頭暈治以澤瀉散者有中虛頭暈治以實土治風法用天麻者有暑盛頭暈治以辛涼者有過天君頭暈治以補心體者金匱凡言冒兼言眩冒者皆頭痛也豈盡風哉今人不但以頭暈為風且以天麻為風藥甚屬可笑按天麻為赤箭之根氣味甘平屬土形如芋魁有遊子十二枚周環之以仿十二辰應六氣之司天天麻如皇極居中得氣運之全為補土之聖藥惟赤箭辛溫屬金金能制風木耳三十六經閉論經閉一症俗名乾血癆今人概用四物八珍當歸養營之類不然則用三稜莪朮大黃桃仁大攻大伐以致不起者不可勝數經謂二陽之病發心脾男子不得隱曲女子不月男子不得隱曲者蓋陽明主約束筋骨而利機關陽明虛則筋骨無以約束而機關不利矣故經謂諸痿獨取陽明女子不月者中焦受氣飲食入胃取汁變化而赤是謂血心主之脾統之肝藏之由肝下注衝脈衝脈滿則月事以時下矣茲陽明虛飲食少血無以生月事從何而來故調經先以胃氣為本次以條暢肝氣為主蓋女子以肝為先天也如肝胃無病方責下焦或通或補視其病之虛實三十七中風論中風症古人有真中類中之分類中者靈樞謂之痱中本實先撥之症外形必緩縱虛在下焦血分者多現於左虛在中焦氣分者多現於右亦有不盡然者合之色脈飲食起居自無難辨再見內風掀動之象乃腎虛無以養肝孤陽獨上有乙癸同源治法土虛肝侮亦有內風掀動之象蓋土之與木也一勝則一負有實土製風法建金制木法若真中風之症外形必拘攣六淫之邪無不可中古以中風名者六淫之邪非風無由得入蓋風為百病之長也講求六氣不透徹清楚斷不能識中風也凡緩縱之虛症宜以痱中之法治之若拘攣之實症除中臟不治外當察其所感何氣所中何經分別治之仲景於中風門中加有痹症三字何也痹症本與中風一類最似中風先師恐學者誤以痹症為中風故特提出曰有痹症也蓋痹症即中風而未傷及臟腑也但以治痹之法治之即愈不必誅伐無過之臟腑也今人概用攻風劫痰何哉三十八外感總論今人不明六氣皆能為病見外感皆曰傷寒而悉以治傷寒之法治一切外感不知傷寒由表及裡其來之漸非至臟不死經謂傷寒者皆熱病之類也熱雖甚不死其兩感於寒者必不免於死蓋兩感者一日太陽受之即見少陰症也少陰者臟也經又謂臟病者半死半生也若溫熱暑濕過衛入營肺主衛心主營入營則近於心胞矣經謂譫語癲狂者死肺也心也皆臟也是溫暑初起即入臟矣溫傷太陰太陰亦臟也燥金剋木木系厥陰經乃臟之盡頭也較之傷寒豈不速而又速哉雖燥金亦有傷表之症但傷里者多以金性沉著之故燥金入里木病必剋土土病則嘔吐泄瀉之症蜂起矣經謂燥極而澤又謂陽明之上中見太陰又謂陽明從中治蓋謂此也大抵經絡受邪入臟腑其來也漸九竅受邪入臟腑其來也頓漸之病猶可截其前路不使之進頓之病必須急護臟真速度之退也三十九溢飲水腫論溢飲水腫蠱脹三者相似而實大有區別今人悉以五皮五苓八味從事而用八味者最多不知八味攝少陰柔多剛少專為婦人轉脬而設並非腫脹門中本方也考古止有內飲用之金匱治溢飲主以大小青龍蓋有脈弦緊為寒主以小青龍之薑桂脈洪大兼熱則非大青龍之石膏杏仁不可內經於水腫蠱脹峙立三法一曰開鬼門二曰潔淨腑三曰去陳莝金匱有風水皮水石水黃汗之分又總論之曰腰以上腫當發汗腰以下腫當利小便素問有病始於上而盛於下者先治其下而後治其上之明文今人概不之講而一以八味了事人命其何堪哉大抵溢飲必兼咳嗽水腫色白腹無青筋蠱脹色赤腹有青筋如蟲紋形似水蛙水腫內經所謂太陰所至發為䐜脹蠱脹內經所謂厥陰所至發為䐜脹也單腹脹亦厥陰病但與開鬱不必利水余此論不過指出今醫之病略舉其大綱本非全書未及盡言學者當於古訓求之意外悟之四十午後發熱論午後身熱今人僉以為陰虛大劑補陰愈補愈劇至死不悟蓋陰虛身熱原在午後要知陰邪自旺於陰分亦午後身熱也如伏暑燥症溫瘧濕中生熱瘀血作燒幼孩食積夜熱之類皆陰邪自旺於陰分最忌陰柔滋膩大抵陰邪之午後暮夜發熱五更必有微汗而解此汗今人皆指為盜汗虛勞午後暮夜發熱必無汗而自解再合之色脈他症舌苔飲食嗜好自無難辨者矣四十一癥瘕論今人治癥瘕概以三稜莪朮歸尾紅花攻瘀之陽藥治之斷不能見效不但不效攻之過急且有癥散為疒鼓之患按癥瘕屬金堅剛牢固深藏在下非緩通絡脈之丸藥如化癥回生丹之類朝夕漸磨不可蓋湯者蕩也其力甚猛宜新病不宜久病宜上中焦不宜下焦延醫者見其十數日不效則以為醫不能治而更醫矣功安在哉丸者緩也既不傷正漸磨錮疾假以時日三月不化至五月五月不化至年餘余治癥瘕有三五月即化者有三四年而後化者若用湯藥何能候至三四年哉雖體強氣壯之人有攻之立效者不可為常也設散為蠱責有攸歸經謂大積大聚衰其大半而止其謹慎為何如哉四十二噎食論噎食之為病陰衰於下陽結於上有陰衰而纍其陽結者治在陰衰有陽結而纍及陰衰者治在陽結其得病之由多由怒郁日久致令肝氣橫逆或酒客中虛土衰木旺木乘脾則下泄或噯氣下泄久則陰衰噯氣久則陽結噯氣不除久成噎食木克胃則氣上阻胸食不得下以降逆鎮肝為要其夾痰飲而陽結則善嘔反胃一以通陽結補胃體為要亦有肝鬱致瘀血亦有發瘕致瘀血亦有誤食銅物而致瘀血者雖皆以化瘀為要然肝鬱則以條暢木氣兼之活絡肝逆則降氣鎮肝發瘕須用敗梳菌銅物須用荸薺汁用各不同若病在上脘絲毫食物不下者非吐不可亦有食膈因食時受大驚大怒在上脘者吐之在中下脘者下之云岐子九法一以劫法下法為主未免純用霸氣喻氏斥之誠是然亦間有應用其法者不可一概抹殺再如單方中之咸韭菜滷之治瘀血牛乳之治胃燥五汁飲之降胃陰牛轉草之治胃槁虎肚丸之治胃體弱獅子油之開錮結活鵝血之治老僧打坐精氣不得上潮泥丸宮而成舍利反化為頑白骨而結於胃脘蓋鵝血純陰能化純陽之頑結也狗尿粟狗寶以濁攻濁而又能補土不可勝紀何今人非用枳朴傷殘則用六味之呆膩余概不聞哉四十三痿痹論近醫之病見痿痹皆云血虛悉從丹溪之說用六味等陰柔恣意補陰古人謂痿痹為軀殼病有終身之纍無性命之憂可見痿痹不死病也若久用陰柔與寒濕相搏固結而不可解其胃氣必傷土惡濕也必溏泄而至於死俗謂濕熱歸脾若用湯藥補氣固住濕熱必成濕痰流注而死金匱水氣門中久不愈必致癰膿即此義也吾見屢矣悲夫四十四自汗論自汗不止今人悉用黃耆浮麥其他法概不知之按傷寒漏汗治以桂枝加附子湯中風自汗治以桂枝湯風溫自汗治以辛涼佐以苦甘如桑葉連翹之類中暑自汗治以白虎狂汗不止脈芤者加人參亦有用生脈散處陽虛自汗輕則用人參黃耆重則用桂附朮甘肺虛自汗用沙參麥冬五味子桑葉之類心虛自汗用秋小麥人參柏子仁龜板之類重者用龍骨牡蠣救逆湯按小麥備四時之氣種於秋而成於夏故走心經種於秋得秋金收斂之氣初生之皮純得秋金之氣以秋小麥洗淨藥煎半熟後入小麥則皮之味恆多重在用皮收斂亦取其成在夏而入心也古時用法如此今人皆用浮小麥按浮小麥有二種一則生時未曾結實自己得氣不足焉能治人一則入倉以後濕熱生蟲有病之物又烏可以治人之病哉陰虛不受陽納自汗即盜汗治以介屬潛陽大固腎氣濕家燥家自汗均以護陽為主痰飲咳嗽自汗即用發汗之麻黃單用其根以收太陽歸縮之氣諸如此類隨症而施可以類推四十五幼科論兒科三大症急驚慢驚疳疾是也俗謂急驚者內經所謂少陽所至為瘛瘲也多得之風火暑三種陽邪與汗出過多本臟自病法宜辛涼與補陰俗謂慢驚者內經所謂太陽所至為痙是也多得之濕燥寒三種陰邪又有嘔吐泄瀉飲食內傷法宜溫脾陽疳疾多由於飲食傷脾亦有思乳思母肝鬱而成者法宜溫宣中焦兼之芳香開鬱亦有殺蟲者痘症從內發癮疹系溫邪最忌發表今人必與表藥治痘症必備四時之氣且前清後溫先瀉後補如制藝中之截搭題法居多亦有純系虛寒始終用保元異功者亦有梟毒大熱始終用石膏大黃者斷不可拘於一格今人偏於寒涼攻下急驚亦與發表慢驚仍用寒涼疳疾則恣用苦寒民豈堪命哉余詳溫病條辨解兒難中四十六用藥分量論用藥分量有宜多者少則不效如溫暑痹症痰飲脈洪者用石膏每至數斤數十斤之多是其常也乙酉年余在浙江紹興治趙大兄伏暑痰飲發則大喘每劑用石膏必以半斤一斤之多而後喘得少減連用七八劑或十數劑而後喘定遲數日又發脈必洪大期年之間用至一百七八十斤之多而後大愈是其變也有宜少者萬不可多用如寒燥門之用蟾酥瘀血門中之用皂礬蟾酥猶可入丸藥皂礬止入外科丹藥丸藥中亦不能用湯劑中用新絳紗用染匠之巧法皂礬在幾微之間稍多則染成元青矣奈紀曉嵐先生閲微草堂筆記中雲乾隆癸丑春夏間京中多疫以張景嶽法治之十死八九以吳又可法治之亦不甚驗有桐城一醫以重劑石膏治馮鴻臚星實之姬人見者駭異然呼吸將絶應手輒痊踵其法者活人無算有一劑用至八兩一人服至四斤者雖劉守真之原病式張子和之儒門事親專用寒涼亦未敢至是實自古所未聞矣考喜用石膏者莫過於明繆仲淳名希雍天崇間人與張景嶽同時而所傳各別本非中道故王懋竑白田集有石膏論一篇力駁其非不知何以取效如此此亦五運六氣適值是年未可執為定例也按先生深惡講學家之拘執先生何嘗不是講學家習氣皆識不卓之故耳前云桐城醫重用石膏治馮姬之病見者駭異然呼吸將絶應手輒痊等論是何足奇余治西人李姓布賈熱病大熱大渴周身純赤一夜飲新汲涼水至二三擔之多汗如雨下譫語癲狂勢如燎原余用石膏每劑先用八兩後加至十二兩後加至一斤後早晚各服一劑每劑煮六碗一時服一碗間服紫雪丹牛黃丸紫雪共用二三兩之多牛黃丸共用至二十餘丸之多鏖戰十數日之久邪之大勢方解繼清餘邪石膏每帖仍用四兩六七帖之後方能脈靜身涼他多類似不能盡述半載余醫案中蓋藥之多寡視病之輕重也又云劉守真張子和專用寒涼亦未敢至是實自古所未聞矣斯未讀古書之故也按張仲景傷寒論中白虎湯石膏本系半斤別本有一斤者即汪訒庵醫方集解中白虎湯用石膏亦系半斤金匱要略木防己湯中石膏用雞子大十二枚或云漢朝戥量本小照今時不過二六扣耳按漢時戥量本小漢時雞子亦小於今乎又云考古喜用石膏者莫過於明繆仲淳本非中道是未聞道之言也試問中道何以定哉蓋中無定體病輕藥重為不中病重藥輕亦為不中病淺藥深為不中病深藥淺亦為不中味厚氣盛之藥多用為不中味淡氣薄之藥少用亦為不中石膏質堅汁少氣薄味淡者也古皆重用何繆仲淳為本非中道也哉自王懋竑白田集石膏論力辨其非亦系未聞道之下士固不足論何足為據桐城醫以秉辛涼金氣金水相生之石膏以復太陰之金體陽明之金用制木火有餘火來剋金之溫病救化源之絶此所以取效如神實系天經地義之定例何云未可執為定例也近時蘇州醫用甘草必三五分余藥皆五七分至一錢即為重用何病可治此故用少之過也本京有某砂鍋之名用大剛大燥皆系八兩十兩一劑有用至數十兩者幼科用歸宗法者十日以外咬牙寒戰灰白塌陷者仍用大黃石膏至一二斤之多人命豈何堪哉此誤用多之過也四十六柴胡醫勞病論柴胡非醫癆損藥也宋元以來多有以柴胡退癆損之午後身熱本經稱其主心腹脹胃中結氣飲食積聚寒熱邪氣並無治虛損之明文汪訒庵本草備要中則稱其治虛勞肌熱並引李時珍之言曰勞有五若勞在肝膽心心包有熱則柴胡乃手足厥陰少陽必用之藥勞在脾胃有熱或陽氣下陷則柴胡為升清退熱必用之藥惟勞在肺腎者不可用耳寇氏一概擯斥殊非通論按李時珍一生學問博而不精汪氏為其所惑反怪寇氏之不通嗚呼冤哉蓋汪氏只於紙篇上用工夫並未將自己之心識對著病人之病機上用工夫井蛙之見簡陋之書讀之愈多貽害愈甚按柴胡之妙其芳香之氣從土中上透雲霄凡外感陷症非此不可濕燥寒三者陰邪用處最多風火暑三者陽邪即斷不可用惟伏暑系陷伏之症藉以升提俾邪從中土之下上升外出若勞損斷不可用者也按經謂陽虛生外寒陰虛生內熱其熱也由於陰虛尚可再用升提使下竭上厥哉或曰古人以柴胡治勞熱倘不見效必不敢筆之於書子何以不敢從其說哉曰是有若大分別從古糊塗至今而莫之辨也中庸曰明辨之而後可以篤行之蓋陰虛者午後身熱至子醜而自退人所共知陰邪與陷下之邪亦午後身熱至子醜而解余溫病條辨中謂陰邪自旺於陰分則人皆不知也其幾微之辨在退燒之際勞病多無汗而熱自退陰邪陷症退熱時必微微汗出也前人所治之勞熱非真勞也乃陰邪與陷症也以其外形午後發熱與勞病相似混而同之真以為柴胡退勞損熱矣誤人不淺若真陰虛之暮熱而用柴胡不死不止四十八産後恣用歸芎論産後之血大概有三有瘀滯而痛者有絡虛而痛者有不寒不熱不虛不實不必用藥者此中惟瘀血作痛兒枕痛者可用歸芎有瘀血上攻歸芎且不作用必用回生丹取其內有食血之蟲飛走有情加醋製大黃急破其瘀緩則有性命之憂若血絡虛而痛者不但不可攻且要急補絡脈如桂圓人參之類尚可攻哉至於無病而妄用歸芎竄其血中之陽氣不至於鬱冒不止也豈非天下本無事庸人自擾之乎何今人一概用生化湯成産後印板方法是何理解民命其何堪哉即胎前保胎亦不可純任歸芎近日藥肆中有保胎無憂散一以歸芎為主血寒者不成胎或微寒而氣滯血凝者固屬相宜若血熱而氣滑利者易成易墮以翕攝陰氣峻補任脈為要豈非見歸芎如讎寇乎今人不問虛實寒熱一概施之不識何故大抵為當歸生血之謬論所誤耳即有可用歸芎之症而又畏其竄陽不如用香附砂仁之為妙蓋歸芎止能活血通滯不能保胎香砂芳香既能通下焦之滯又能開胃健食以養胎元其辛竄之氣較柔于歸芎遠矣香附一節一膜深藏根底縮砂蔤一房一膜深藏葉底二者均有胎包深藏之象故亦能保胎也再婦科胎前産後專究八脈時人均不知之蓋八脈為生化之源也余詳溫病條辨解産難中四十九渴證論時人治渴舍涼藥無二法仲景謂渴者與豬苓湯蓋腎主消渴此渴即司馬相如病消渴之渴也病在臟瀉其腑故以豬苓澤瀉滑石瀉膀胱使火從水中去而單以一味阿膠補本臟之液此渴必飲多溺少他如痰飲之反渴用辛能潤法蓋飲居心下格拒心火不得下通於腎反來上鑠咽喉故嗌乾又格拒腎中真水不得上潮於喉故引外水求救之水之不得行者陽氣鬱也若以涼藥潤藥治之無不死者今人則皆然矣哀哉五十肝鬱用逍遙散論今人見肝鬱僉用逍遙散效者半不效者半蓋不知有仲景新絳旋覆花湯繆仲淳蘇子降香湯之妙也蓋經主氣直行屬陽逍遙散中之柴胡直行為縱絡主血橫行屬陰新絳等湯專走絡橫行為橫治肝宜橫而不宜縱蓋肝之怒氣直衝上行豈可再以柴胡直性上行者助其勢乎其間有見功者肝喜條達故也或有陰邪伏陷故也肝主血絡亦主血同類相從順其勢而利導之莫如宣絡再肝鬱久則血瘀瘀者必通絡豈逍遙散氣藥所能治乎五十一升陽散火論升陽散火四字一聯而下絶解不通蓋陽升則火愈熾火性炎上是其理也若真正火症如何可以升陽治之哉唐以前無是法宋元以後此法盛行瑭思維數十年不解其故以為總無是理必無此事古人未必安心害人必其用之得效而後立法相傳近年以來下元甲子兌七宮用事燥金之症頗多燥金本寒標燥頗似火症煩躁不寧身熱如火若燥金之脈本弦短而澀格陽者反洪大數實純似火症之脈感燥表裡兼受受邪太重者必格陽格陽者純似火症非用升陽藥不可蓋前人誤認燥為火也見腹痛胸脅痛瘕疝等症又誤認燥為寒也五十二痰飲用二冬二母六味論黃帝問曰肺之令人咳何也岐伯對曰形寒飲冷則傷肺也雖五臟六腑俱能令人咳外有風溫溫熱之咳不在痰飲之中者究系痰飲居多仲景謂病痰飲者當以溫藥和之所以必用溫藥者補脾陽與三焦之火也坎中滿水非陽氣不行也其金匱痰飲門與咳嗽門中僉用溫藥何近世一概以二冬二母之苦寒不然則以六味之酸甘化陰如果肺胃燥熱用之誠善風溫溫熱之咳只用辛涼甘潤亦不用苦寒若遇痰飲陰邪或兼風寒及燥金本氣豈非見苦寒如讎仇乎古人有因咳致痰因痰致咳之辨學者不可不知蓋因痰致咳者半日無痰絶不咳嗽且痰飲夜咳必甚亥子醜水旺時也其聲重濁屬土飲本兩太陰病也若因咳致痰者必無甚多痰或稍有痰或竟無痰唇口舌面多赤色脈多數或舌有黃苔或寅卯時咳甚脅痛為木扣金鳴之咳面色不改舌多白脈必弦或雙弦或單絃病至極亦有洪大滑數者乃反象也為難治陰陽現症不可不辨再痰飲之所以不可用一毫苦寒涼藥者經謂飲食入胃脾氣散精上輸於肺歷絡三焦通調水道下達膀胱三焦之火不足不能生土脾虛不能代胃行津液遂成支飲射肺之咳脾為太陰飲為陰邪弦為陰脈脾病而現肝之脈也再投涼藥或柔藥豈非為賊立幟乎吾又見有肝鬱者多兼痰飲蓋木病必剋土克胃土則不食或嘔克脾土不泄則咳脾受克則失其散津之職也今人見肝鬱多用黃芩冬地亦大與痰飲不合且無飲者服久必致成飲矣見痰飲之咳又謂為勞病恣用補陰不可為矣五十三外感身熱或咳僉用瀉白散論瀉白散錢仲陽治小兒實熱已退虛熱不除者納氣歸元法也痘後無外感氣不歸元者用之誠然今人外感僉用之致令風寒深入腎竅終身不拔為害甚多夫以葉氏之明猶不知此緣載在金匱要略金瘡門中王不留行散下特未之讀耳余解兒難中已詳之矣茲不多贅五十四眼科恣用發表苦寒論五臟六腑之精華皆上繫於目人之有目如天之有日水火之精相搏而成皆清空之氣浮而上升者也用藥豈容稍有鹵莽必實有外感何氣方可用外感何氣之藥必實系實火方可少加苦寒亦必有甘寒監之蓋畏其苦先入心其化以燥也今人不問外感內傷一概先用發表繼以苦寒不瞎何待如偏頭痛有害一目之弊系本臟自病少陽膽經之熱乃大用辛溫發三陽之表繼以苦寒無怪乎損目之多余謂世無眼科則瞽者必少五十五外科恣用苦寒論內科臟病為重腑病為輕外科則不然蓋臟病傳腑出腑則輕矣腑病傳臟入臟則重矣外科不可輕用苦寒畏其傷腑陽而入臟也蓋癰者壅也疽者阻也營衛不和氣血不得周流無間而後成癰疽再用苦寒以泄之使毒氣壅滯愈不得調潰爛無已傷里膜則毒侵入臟而死矣大抵以調和營衛為第一要著如病勢沉重非大補腎中真陽不可蓋營出中焦衛出下焦兩腎中間之陽氣乃衛氣之根本也再善治外症者原不必令其潰膿出頭不動聲色使其自化最妙今之外科以為不潰膿不出頭則無功可見只為自己取錢起見不顧人之性命可恨之極使之出頭甚易既使之出又不能收日久氣血耗散雖有善收口者亦無如之何矣再有不善脫腐腐不盡而驟收之收後必再發屢發屢收成壞瘡矣哀哉五十六痘科恣用苦寒論大學注云是則偏之為害而家之所以不齊也豈必齊家為然哉天下萬事莫不因偏而壞余前云醫必備四時之氣而後可近代著痘科書者多主寒涼考歸宗一法其源出於胡氏繼有費建中救偏瑣言歸宗特寒涼攻伐梟毒之一法而已費氏之書名曰救偏蓋救淺學者單主陳文中溫補一法有春夏而無秋冬之偏寒涼則有秋冬而無春夏又烏足以成歲哉余溫病條辨解兒難中辨之最詳不贅五十七醫方集解不通咸宗之論子輿氏謂楊墨之道不熄孔子之道不著唐以後醫道之壞極矣先是唐末五代之際醫者率用毒藥不能對準病情傷人實多以致有雷公炮製和劑局方之設將毒藥之方俱收入禁方此醫道之一壞也繼則代有名醫如東垣丹溪河間輩各以一偏之見各立門戶以成一家之名又一壞也下而明季陶氏六書之作混六氣俱曰傷寒籠統立方籠統治病世咸宗之樂其簡便又一大壞也至汪訒庵醫方集解一出家弦戶頌樂其簡便若以之治病鮮有不殺人者其補劑首選一方曰六味地黃丸補陰者也反將小建中黃耆建中當歸建中附於桂枝湯表劑之下陰陽倒置莫此為甚其贊六味丸也妙不可言其於建中也無一言發明是使天下重地而輕天有母而無父有秋冬而無春夏嗚呼可哉不知六味丸本錢仲陽幼科門中存陰退熱法也自丹溪專主補陰唱之於前薛立齊趙養葵汪訒庵等衆和之於後而生民之禍極矣訒庵於三黃石膏湯下云治傷寒溫毒表裡俱熱夫以表裡俱熱之溫毒而可以麻黃豆豉合生薑大棗辛甘化陽大助其表裡之熱哉又五黃散下云治傷寒表症又治內傷生冷腳氣瘧疾等症又治婦人經水不調其總論曰此陰陽表裡通用之劑也夫表裡陰陽正相反者也有一方而可以統治之理乎雖以仲祖之賢其曰表急急當救表裡急急當救里其於表裡陰陽分之最悉若一方可以統治醫道不難矣仲景當日何必至再至三分析表裡乎其於九味羌活湯下云既治傷寒又治傷風而仲景謂風家表虛寒家表實細立桂枝麻黃兩法豈可俱以羌活一方治之乎既治風與寒矣又治溫病熱病夫傷寒陰邪也溫與熱陽邪也豈可均以羌活發太陽之陽統治之乎他如此類甚多不及殫述其不通彼不自知也若自知必不筆之於書矣後人宗之轉相仿效生民之禍何日已哉不通之書不止此一種惟此種最行於世余目擊神傷不得不起而辨之獲罪無所逃也五十八四君子湯論舉世用四君子湯而不知其所以然之故余藉此一方以開後學測古方之妙義又開加減去取之法是古方皆當如是體驗也四君為補氣而設按肺主氣補氣必補肺矣然不從肺著想而從脾胃著想者何也虛則補其母也補土生金即所以補氣也白朮炙甘草脾經守藥也甘草純甘不兼他味守中之守藥也白朮兼苦而能滲濕守中之通藥也人參茯苓胃中通藥也人參苦少甘多通中之守藥也茯苓淡滲而能達下通中之通藥也知此欲單用通則去朮草單用守則去參苓單用通中通則單用茯苓單用守中守則單用甘草當兼用通守者則兼用之能合能分能加能減能輕能重能暫能久用藥之能事畢矣補土必兼滲濕者土最受濕而反惡濕也色白黃之藥多兼走肺胃也蓋肺之臟象屬金化氣屬土也胃之臟象屬土化氣屬金也五十九腎氣丸論腎者坎也坎以中陽為體以外陰為用在六氣中曰少陰君火不曰太陽寒水故以附子得日之魂者以補中陽氣分之陽以肉桂得日之魄者補中陽血分之陽以色黑入腎之地黃合萸肉酸甘化陰者以補外用之陰水喜流通下入於地故以茯苓松根生者滲之水喜升化上交於天故以澤瀉升之水惡泛濫故以山藥補土而堤防之虛則補母故以丹皮金水相生者補母以生之山藥茯苓色白人肺亦能補其母也其所以治婦人轉脬者奈何蓋轉脬原腎氣之虛然徒補腎未見其即治也此方地黃壯水之源前後二陰皆肝經所過之地肝主疏泄萸肉合丹皮酸泄辛通使肝復其疏泄之職茯苓合陰藥下降澤瀉合陽藥上升山藥補土從中以制之有升有降有制而脬系之轉者直矣系直則溺出溺出則由漸而暢轉脬治矣再補一臟者必兼三臟剋水之土有山藥茯苓以治之水克之火有桂附以實之六十宋竇材扁鵲心書論竇氏述扁鵲法其頭等方以艾火燒之多至五百壯如風關氣關命關各五百壯則一千五百壯矣二等法則用大丹三等法則純用辛熱以為能治死症大症小仲景之書以為但能治小症而已不足學也對天立誓懇摯肫誠夫竇氏之眼孔亦只見一時未能上觀千古下觀千古也在竇氏當日必有奇效屢試屢驗遂自信不疑故敢對天立誓也不知燥金行疫之時原宜火攻竇氏適逢其會耳按扁鵲自云吾未能生死人者也竇氏述扁鵲之法而反能生死人哉學者於竇氏法不可不信人非陽氣不生活如四時之有夏也但取其能剋金而已不必全信以為能治一切諸症則非矣湯液醫方自仍當以仲景之法為得中參之諸家以補其不備可也六十一誤用苦寒反似火症論誤用苦寒久而唇舌齒牙焦黑脈反洪數純是火症之形醫者見是曰若是猶非火症之明徵乎至死不悟經云苦先入心其化以燥未知體驗耳苦寒在濕熱門中用之最多欲其化燥也風火門中用處反少要以甘寒當權斷不可令苦寒當權而使之化燥也炎上作苦苦本屬火為佐藥可也燥症門中籍以反佐更須少用六十二雨水論坎離代天地用事人非水火不生活故醫者必究水火按草之火最柔而木火則剛矣然木之中亦萬有不齊其性堅者火必剛葇脆者火必柔最剛者莫如石火亦萬有不齊石火之中至剛者莫如京師之紅煤凡試火之法以大錢一枚置水鍋內紅煤之高者水開時則錢浮水面其次則半浮半沉火柔則錢離鍋底不過二三寸而已矣剛火所排之靴帽至舊不改樣柔火萬不能也學者可藉以助格致之理食剛火者多熱病食柔火者多濕病至水於泉水最清削去垢有餘清頭目最勝河為陽水通六腑最速濟為至陰之水伏流黃泉之下其性沉降補五臟有專功他如千里急流水靈樞半夏湯治不寐用之取其急驅胃陰下降也甘瀾水因無從取之千里急流水者但以水揚千萬遍使之起花急逐痰飲前人治痰飲用之其生化最速去陳菀如神者莫如雨水而雨水之中化氣最速又莫如伏雨孟子所謂有如時雨化之何李時珍本草綱目於雨水條下毫無發明但曰春分日雨水夫婦各飲一杯可以有孕試問誰系飲春分之水而後有孕哉如此耳食之談副載一條亦未始不可雨水正文何反不言功用余特補之六十三五穀論五穀亦百草之結子者也谷者善也五者五行也聖人取其性善形色氣味之可以養五臟者教民樹藝以養生焉五穀何以為善味甘淡也人系倮蟲屬土土味甘以甘補土故取甘也尤必以淡為善者何也蓋味之至重者必毒稍重者必偏惟淡多甘少者得中和之氣故曰谷也且淡開五味之先不在五味之中而能統領五味者也五味皆屬地氣地食人以五味也惟淡屬天氣清華沖和最能滲泄土中之濁氣而使之復其清明之體故必以淡為善也五穀中最重黍稷者何也黍稷體圓而色黃味得甘淡之中故先王首重黍稷焉如黃豆在五穀中甘味最重則不可作飯且不可多食多食則脹滿論語云食夫稻衣夫錦似稻又細於黍稷者何也蓋黍稷生於剛土而性剛長於補脾稻生於濕土而性柔長於補胃淡味獨勝似其品高於黍稷但色白形長喜水偏於濕重終就臣位自仍當以黍稷之中正為君也周頌曰貽我來牟似大小二麥亦不輕於黍稷也蓋二麥補五穀之所不及者也五穀除麥之外皆以濕土行令而下地以濕土收令而上倉麥則反是以秋分後濕土收令而下地以夏至前濕土行令而上倉單避濕土之氣故其性燥而開胃有濕病者最宜土性濕而反惡濕也且金水木火四時之氣即元亨利貞之天氣也濕土則純然地氣矣但補偏救弊者皆臣道也六十四大棗論大棗木之至堅而棗肉則果肉中之至密者也色赤黑味甘微酸取其以補脾經血分之陰去核使不走下焦配以生薑補胃中氣分之陽一陰一陽之謂道為中焦調和營衛之要品而今人多用紅棗本草綱目中謂紅棗理疏不入藥豈未之見耶六十五白芍論本經稱白芍氣味苦平無毒主治邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣並無酸味之明文張隱菴謂後人妄改聖經曰微酸元明諸家相沿為酸寒之品試將芍藥咀嚼酸味何在春生紅芽稟厥陰木氣而治肝花開三四月間稟少陰君火而治心瑭按芍藥亥月生芽藏於根中仲春紅芽出於地上春盡而後開花何丹溪謂産後忌服伐生生之氣按陽生於子中實根荄於亥故古人禘祭祭始祖所自出必用亥月以亥為始祖所自出也芍藥亥月生芽遍歷子醜寅卯辰巳六陽之全而後開花豈伐生生之氣者哉並未細心格物無知妄作莫此為甚六十六桂枝論桂生於廣南氣味辛溫無毒枝有暢茂條達之義行陽氣利關節補中益氣之要藥用處最多何東垣謂其橫行手背禁人之用試問槐枝桑枝不能橫行手背乎何獨單禁桂枝其說有二或者當日以桂枝醫溫熱必不合拍以溫病最忌辛溫補中益氣也或者東垣欲立補中益氣湯獨創一門必沒殺仲景之建中法故力砭桂枝也若識見不到學術不精因誤成忌其過猶輕若為門戶起見上滅先師下蒙後學其心尚堪問哉再按桂生於廣南日出之地色赤得日之魄者也附子生於章明赤水日光對照之地色白兼黑得日之魂者也故有走氣走血之分六十七甘草論甘草純甘不兼他味故獨擅甘草之名其性守而不走甘屬土土主信也為其守也故中滿腹脹者忌之宣通絡脈者避之今人則一概用之不問何方必加甘草以為能和百藥此必用甘草之病也至於當用甘草之方如炙甘草湯之類湯名甘草以之為君也治傷寒脈結代防其脫也全賴其坐鎮不移之力而用一錢或八分五分不盡其力烏得有功此不敢用甘草之病也六十八枳實枳殼論枳實堅實下沉專走幽門幽門者胃之下口小腸之上口也逐渣滓痰飲使由胃而入小腸由小腸而入大腸枳殼生穰輕虛上浮專走賁門賁門者胃之上口也方書謂誤用枳殼傷胸中至高之氣今人以本草中稱枳實有推牆倒壁之功避而不敢用反用枳殼誤傷無過之地而幽門之渣滓痰飲反不得除是何理解且藥肆中以枳實少而枳殼多竟以枳殼代枳實改做外貌醫者不察害人不淺矣六十九細辛論細辛細而辛者也一莖直上端生一葉其莖極細其味極辛本經稱其氣味辛溫無毒主咳逆上氣頭痛腦動百節拘攣風濕痹痛死肌久服明目利九竅輕身長年張隱菴謂細辛乃本經上品藥也味辛臭香無毒主明目利竅宋元祐陳承謂細辛單用末不可過一錢多則氣閉不通而死近醫多以此語忌用嗟嗟凡藥所以治病者也有是病服是藥豈辛香之藥而反閉氣乎豈上品無毒而不可多服乎方書之言俱如此類學者不善詳察而遵信之醫門終身不能入矣汪訒庵本草備要中將單用末三字刪去直謂之不可過一錢多則悶絶而死雖死無傷可驗且引開平獄嘗治此以實之其不通有如此哉七十僞藥論古時醫者自採藥詳辨其形色氣味屢試確當者方敢為人醫病近日藥肆買之藥行藥行買之客人客人買之大馬頭坐客坐客買之各省山農其中作僞不可悉數即如黃河以南所用之黨參系青州軟苗防風本京所用之黨參系北口薺苨間有山西潞州之防風薺苨美稱之曰潞黨西黨按上黨所産之參與遼産無二形其價亦相若現在王氣在東上黨所産甚少不能發賣豈有數百文買參一斤之理豈天下之大四海之廣藥鋪之多大者積數百斤中者數十斤上黨一山豈竟能産如許之參以待天下之用不待智者而知其僞也且黨參果可代用何必以重價買人參哉何世醫僉不知之而必以黨參代人參之用豈真不知哉以為便於行也不知醫便於行而用假藥是欺病人也病人賴醫者救命可設一騙局以欺之哉他如石蓮子系蓮子之老堅者落水入汙泥中經年不壞其功能澀下焦滑脫蓮子甘多咸少石蓮子則咸多甘少矣近日藥肆中所備之石蓮子系野樹之子黑殼黃肉無心其味極苦最能瀉人李時珍著本草綱目時已謂其斷莊二百餘年滑脫之病反用極苦瀉之不死不止赤小豆即五穀中之小豆皮肉俱赤近日藥肆中用廣中半紅半黑之野豆色可愛而性大非斷不堪用新絳紗內系三品生絲既能通絡又能補絡紅花生血和血單以幾微皂礬化瘀今人概以帽幃代之斷不可用也如四君子湯人參即是假茯苓系安苓白朮系種術只餘甘草一味又不敢重用將挾何術以取效乎其他僞藥不可盡述有心救世者當自考之七十一雷公炮製論雷公炮製此雷公系五代時之雷斆其學術未見精也今人誤認為黃帝岐伯時論道之雷公謹遵之而不敢議蓋世運至五季之衰無道不壞古方多用生藥毒藥藥之偏所以矯病之偏也五季之時醫失其學殺人者多故雷公起而救之不能使天下之醫皆有學問遂將稍有性氣之藥不分有毒無毒上品中品下品一概炮製如茯苓平淡之上品用乳制恐其滲也若畏其滲何如不用用之者用其滲也去其滲而用之何所用哉人參用秋石制欲其入腎也以大隊補腎藥或補八脈藥而用人參自有功用何必制之即制之亦未必入腎也阿膠炒成珠畏其膩也既畏其膩何不改用他藥且阿膠取濟水之極深沉降水曰潤下茲以火炒之是炎上也半夏不用薑製而用礬制古法用生薑制以生薑能製半夏之小毒半夏生薑有相須之妙近日藥肆中用礬制潔白好看不適於用斷不可從他如麥冬之去心論詳溫病條辨中其他錯謬之處不能殫述學者當隨時考查通者從之不通者違之一視天理之公不可稍存好惡七十二引經論藥之有引經如人之不識路徑者用嚮導若本人至本家何用嚮導為哉如麻黃湯之麻黃直走太陽氣分桂枝湯之桂枝直走太陽營分蓋麻黃桂枝為君者即引也雖其中有生薑大棗生薑為氣分之佐大棗為營分之佐非引經也何今人凡藥鋪中不賣須本家自備者皆曰引子甚至所加之引與症不合如痘科中既用蘆根又用香菜大熱赤疹必用三春柳每方必曰引加何物不通已極俗惡難醫附一半夏論半夏古法用生薑制蓋生薑能製半夏之小毒半夏生薑二者有相須之妙近日肆中概用礬制取其潔白好看不適於用斷不可從附二醫字論古云醫者意也不通之至醫豈可以意而為之哉凡有巧思者藝也非意也按周禮醫為醬屬取其由蒸變而成之物而又能蒸變人之脾胃也醫士之名醫取其自能蒸變而成學術自能蒸變人之疾病由痛苦而平和余益之以一言曰醫者易也有不易之定理有交易之變通有變易之化工附三醫德論天下萬事莫不成於才莫不統於德無才固不足以成德無德以統才則才為跋扈之才實足以敗斷無可成有德者必有不忍人之心不忍人之心油然而出必力學誠求其所謂才者醫也儒也德為尚矣附四醫以明理為要論醫之為學明道之一端為冢宰屬官所以佐相業之調和鼎鼎燮理陰陽者也奈後世高者為藝術低者為糊口計日趨日下按內經以明理為要方止有七越人難經亦以明理為要並無方藥自唐以後竟尚方術遂有千金方肘後方各家本草方書汗牛充棟而醫道大壞不明理者用毒藥如未能操刀而使割以致殺人無算有宋起而救之不明明理為要乃有和劑局方之設醫道至此壞而愈壞矣蓋以方救方如以火救火不至於燎原不止也局方之設將以前所有毒藥之方一概禁止名之曰禁方不準世用而單行局方不知周禮醫師掌醫之政令聚毒藥以共醫事若一以和劑為主如甘草至和之藥膨脹得之即死五穀為日用之需善而又善者也熱病熱未退時早食即死能將藥之甘草並五穀悉禁之哉此方書不足恃之明效大驗也不明理者雖飲食亦不能調飲食亦能殺人餘生十五子死者九人為不明理之婦人以飲食殺之者七人明理者雖毒藥亦應手而效故醫必以明理為要中庸謂明善而後可以誠身擇善而後可以固執也
